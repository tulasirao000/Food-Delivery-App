<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ZipBite - Customer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background: #f8f8f8; }
    .navbar { background: #fff !important; border-bottom: 1px solid #e5e5e5; }
    .navbar-brand { font-size: 1.3rem !important; }
    .nav-link.active { color: #fff !important; background: #FF6B35; }
    .restaurant-card { 
      transition: all 0.2s;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
    }
    .restaurant-card:hover { 
      box-shadow: 0 8px 18px -6px rgba(255, 107, 53, 0.2);
      transform: translateY(-2px);
      border-color: #FF6B35;
    }
    .pointer { cursor:pointer; }
    .list-group-item { border-color: #e5e5e5; }
    .card { border-color: #e5e5e5; border-radius: 10px; }
    .btn-primary { background: #FF6B35; border-color: #FF6B35; }
    .btn-primary:hover { background: #e55a28; border-color: #e55a28; }
    .btn-success { background: #FF6B35; border-color: #FF6B35; }
    .btn-success:hover { background: #e55a28; border-color: #e55a28; }
    .badge { border-radius: 4px; }
    .tracking-card {
      background: linear-gradient(135deg, #fff 0%, #fafafa 100%);
      border: 1px solid #e5e5e5;
      padding: 1.5rem;
      border-radius: 10px;
      margin-top: 1rem;
    }
    .loading { display: none; text-align: center; padding: 2rem; }
  </style>
</head>
<body>
<nav class="navbar navbar-light">
  <div class="container">
    <span class="navbar-brand d-flex align-items-center gap-2 fw-bold" style="color:#FF6B35;">
      <span style="font-size:2rem;">🍕</span> ZipBite
    </span>
    <div id="authBox">
      <button class="btn btn-outline-secondary btn-sm" onclick="showPage('login')">Login</button>
    </div>
  </div>
</nav>

<div class="container py-4">
  <!-- LOGIN -->
  <div id="page-login" class="d-block">
    <div class="row">
      <div class="col-md-4 offset-md-4">
        <div class="card shadow">
          <div class="card-body p-4">
            <h3 class="mb-4 text-center" style="color: #FF6B35;">Customer Login</h3>
            <form onsubmit="login(event)">
              <input class="form-control mb-2" placeholder="Email" id="loginEmail" type="email" required>
              <input class="form-control mb-3" placeholder="Password" id="loginPassword" type="password" required>
              <button class="btn w-100" style="background:#FF6B35;color:#fff;" type="submit">Login</button>
            </form>
            <div class="text-center mt-3 small text-secondary">Demo: demo@example.com / demo123</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- HOME -->
  <div id="page-home" class="d-none">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Restaurants</h2>
      <button id="cartBtn" class="btn btn-outline-primary" onclick="showPage('cart')">🛒 <span>0</span></button>
    </div>
    <div id="restaurantsLoading" class="loading"><div class="spinner-border"></div></div>
    <div id="restaurantsBox" class="row g-3"></div>
  </div>

  <!-- MENU -->
  <div id="page-menu" class="d-none">
    <button class="btn btn-link mb-3" onclick="showPage('home')">← Back to Restaurants</button>
    <div id="menuHeader"></div>
    <div id="menuLoading" class="loading"><div class="spinner-border"></div></div>
    <div id="menuBox" class="list-group"></div>
  </div>

  <!-- CART -->
  <div id="page-cart" class="d-none">
    <button class="btn btn-link mb-3" onclick="showPage('home')">← Back to Restaurants</button>
    <h3 class="mb-4">Your Cart</h3>
    <div id="emptyCart" class="alert alert-info">Cart is empty</div>
    <div id="cartBox" class="card mb-4"></div>
    <button id="checkoutBtn" class="btn btn-success w-100" onclick="showPage('checkout')">Proceed to Checkout</button>
  </div>

  <!-- CHECKOUT -->
  <div id="page-checkout" class="d-none">
    <button class="btn btn-link mb-3" onclick="showPage('cart')">← Back to Cart</button>
    <h3 class="mb-4">Checkout</h3>
    <div class="row g-3">
      <div class="col-md-6">
        <form onsubmit="placeOrder(event)">
          <input class="form-control mb-2" placeholder="Full Name" id="checkoutName" required>
          <input class="form-control mb-2" type="tel" placeholder="Phone" id="checkoutPhone" required>
          <textarea class="form-control mb-2" placeholder="Delivery Address" id="checkoutAddress" required></textarea>
          <button class="btn btn-success w-100" type="submit">Place Order</button>
        </form>
      </div>
      <div class="col-md-6">
        <div class="card">
          <div class="card-body">
            <h5>Order Summary</h5>
            <div id="checkoutOrderSummary" class="small mb-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ORDERS -->
  <div id="page-orders" class="d-none">
    <button class="btn btn-link mb-3" onclick="showPage('home')">← Back to Home</button>
    <h3 class="mb-4">My Orders</h3>
    <div id="ordersLoading" class="loading"><div class="spinner-border"></div></div>
    <div id="orderHistoryBox"></div>
  </div>

  <!-- ORDER STATUS / TRACKING -->
  <div id="page-status" class="d-none">
    <div class="mb-2">
      <button class="btn btn-link" onclick="showPage('orders')">← Orders</button>
    </div>
    <h4 id="statusOrderId"></h4>
    <div class="card mb-4">
      <div class="card-body">
        <h6 class="mb-3">Order Timeline</h6>
        <div id="statusTimeline" class="text-secondary"></div>
      </div>
    </div>
    
    <div class="tracking-card">
      <h6 class="mb-3">Live Delivery Tracking</h6>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label small fw-600">Your Location (Share with Driver)</label>
          <div class="input-group input-group-sm">
            <input class="form-control" id="liveLat" placeholder="Latitude">
            <input class="form-control" id="liveLng" placeholder="Longitude">
            <button class="btn btn-outline-primary" onclick="shareLiveLocation()">Share</button>
          </div>
          <div class="small mt-2 text-success" id="liveLocResult"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-600">Driver Location</label>
          <div class="alert alert-info mb-0 small">
            <div>Latitude: <strong id="driverLat">--</strong></div>
            <div>Longitude: <strong id="driverLng">--</strong></div>
            <div class="text-muted mt-2">Updates automatically every 3 seconds</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="api-client.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let user = null, restaurants = [], cart = [], orders = [];
  let currentRest = null, currentOrder = null;
  let locationUpdateInterval = null;

  function showPage(p) {
    ['login','home','menu','cart','checkout','orders','status']
      .forEach(pg => document.getElementById('page-' + pg).classList.add('d-none'));
    document.getElementById('page-' + p).classList.remove('d-none');
    if (p === 'home') renderHome();
    if (p === 'cart') renderCart();
    if (p === 'orders') renderOrders();
    if (p === 'menu') renderMenu();
    if (p === 'status') {
      renderStatusPage();
      startLiveLocationTracking();
    }
    if (p === 'checkout') renderCheckout();
  }

  function login(e) {
    e.preventDefault();
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;
    if (!email || !password) return alert("Fill both fields");
    user = { email };
    showPage('home');
    document.getElementById('authBox').innerHTML = `<span class="text-secondary small">Hi, ${email.split('@')[0]}</span>`;
  }

  function logout() {
    user = null;
    cart = [];
    if (locationUpdateInterval) clearInterval(locationUpdateInterval);
    showPage('login');
    document.getElementById('authBox').innerHTML =
      `<button class="btn btn-outline-secondary btn-sm" onclick="showPage('login')">Login</button>`;
  }

  function renderHome() {
    restaurants = DataManager.getRestaurants();
    const box = document.getElementById("restaurantsBox");
    if (restaurants.length === 0) {
      box.innerHTML = `<div class="alert alert-info col-12 text-center py-5">No restaurants available yet.</div>`;
      return;
    }
    box.innerHTML = restaurants.map(r => `
      <div class="col-md-4 col-lg-3">
        <div class="card restaurant-card h-100 pointer" onclick="selectRestaurant(${r.id})">
          <div class="card-body">
            <h6 class="mb-2"><strong>${r.name||"?"}</strong></h6>
            <div class="mb-2 small text-secondary">${r.cuisine||"Cuisine"}</div>
            <div class="d-flex gap-2">
              <span class="badge bg-warning">⭐${r.rating||"?"}</span>
              <span class="badge bg-light text-dark">₹${r.deliveryFee||"0"}</span>
            </div>
          </div>
        </div>
      </div>
    `).join('');
    document.getElementById("cartBtn").querySelector('span').innerText = cart.length;
  }

  function selectRestaurant(id) {
    currentRest = restaurants.find(r => r.id === id);
    showPage('menu');
  }

  function renderMenu() {
    if (!currentRest) { showPage('home'); return; }
    const menu = DataManager.getMenuForRestaurant(currentRest.id) || [];
    document.getElementById("menuHeader").innerHTML = `<h4 class="mb-3">${currentRest.name}</h4>`;
    const list = document.getElementById("menuBox");
    if (menu.length === 0) list.innerHTML = `<div class="text-secondary text-center py-4">No menu items yet.</div>`;
    else list.innerHTML = menu.map(item => `
      <div class="list-group-item d-flex justify-content-between align-items-center">
        <div>
          <strong>${item.name}</strong> <span class="small text-secondary ms-2">₹${item.price}</span>
        </div>
        <button class="btn btn-sm" style="background:#FF6B35;color:#fff;" onclick="addToCart(${item.id},'${item.name}',${item.price})">Add</button>
      </div>
    `).join('');
  }

  function addToCart(id, name, price) {
    cart.push({id, name, price, quantity:1, restaurantId: currentRest.id});
    document.getElementById("cartBtn").querySelector('span').innerText = cart.length;
    alert(`${name} added to cart!`);
  }

  function renderCart() {
    document.getElementById("emptyCart").style.display = cart.length === 0 ? '' : 'none';
    const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    document.getElementById("cartBox").innerHTML = cart.map((item, i) => `
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center border-bottom py-3">
          <div>
            <strong>${item.name}</strong>
            <div class="small text-secondary">₹${item.price}</div>
          </div>
          <button class="btn btn-danger btn-sm" onclick="removeCart(${i})">Remove</button>
        </div>
      </div>
    `).join('') + (cart.length > 0 ? `<div class="card-body"><strong>Total: ₹${total}</strong></div>` : '');
    document.getElementById("checkoutBtn").disabled = (cart.length === 0);
  }

  function removeCart(i) {
    cart.splice(i, 1);
    renderCart();
    document.getElementById("cartBtn").querySelector('span').innerText = cart.length;
  }

  function renderCheckout() {
    const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    document.getElementById("checkoutOrderSummary").innerHTML = cart.length === 0
      ? `<div class="text-danger">Cart is empty.</div>`
      : `<div class="mb-3">${cart.map(item => `<div class="d-flex justify-content-between"><span>${item.name}</span><span>₹${item.price}</span></div>`).join('')}</div><div class="border-top pt-2 fw-bold">Total: ₹${total}</div>`;
  }

  function placeOrder(e) {
    e.preventDefault();
    const name = document.getElementById("checkoutName").value;
    const phone = document.getElementById("checkoutPhone").value;
    const address = document.getElementById("checkoutAddress").value;
    if (!name || !phone || !address) return alert("All fields required");
    
    const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    const orderId = 'ORD-' + Date.now();
    const order = {
      id: orderId,
      restaurantId: currentRest.id,
      customerName: name,
      customerPhone: phone,
      customerAddress: address,
      items: JSON.parse(JSON.stringify(cart)),
      total: total,
      status: 'Order Placed',
      timeline: ['Order Placed'],
      createdAt: new Date().toISOString()
    };
    DataManager.addOrder(order);
    cart = [];
    alert("Order placed! Tracking it now.");
    showPage('orders');
  }

  function renderOrders() {
    orders = DataManager.getOrders();
    const box = document.getElementById("orderHistoryBox");
    if (orders.length === 0) box.innerHTML = `<div class="text-secondary text-center py-4">No orders placed yet.</div>`;
    else box.innerHTML = orders.map((o, i) => `
      <div class="card mb-3" onclick="statusPage(${i})" style="cursor:pointer">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <h6 class="card-title mb-1">${o.id}</h6>
              <div class="small text-secondary mb-2">${new Date(o.createdAt).toLocaleDateString()}</div>
              <div class="small">${o.items?.length || 0} items - ₹${o.total}</div>
            </div>
            <span class="badge bg-primary">${o.status}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  function statusPage(i) {
    currentOrder = orders[i];
    showPage('status');
  }

  function startLiveLocationTracking() {
    if (locationUpdateInterval) clearInterval(locationUpdateInterval);
    locationUpdateInterval = setInterval(() => {
      if (!currentOrder) return;
      const driverLoc = DataManager.getLiveLocation(currentOrder.id, 'driver');
      if (driverLoc) {
        document.getElementById('driverLat').textContent = driverLoc.lat.toFixed(4);
        document.getElementById('driverLng').textContent = driverLoc.lng.toFixed(4);
      }
    }, 3000);
  }

  function renderStatusPage() {
    if (!currentOrder) return showPage('orders');
    document.getElementById("statusOrderId").innerHTML = `<strong>Order: ${currentOrder.id}</strong> - ${currentOrder.status}`;
    document.getElementById("statusTimeline").innerHTML = (currentOrder.timeline || []).map(st =>
      `<div class="mb-2"><span class="badge bg-success me-2">✔</span> ${st}</div>`
    ).join('') || `<div class="text-secondary">Order is being processed...</div>`;
    
    const custLoc = DataManager.getLiveLocation(currentOrder.id, 'customer');
    if (custLoc) {
      document.getElementById('liveLocResult').innerHTML = `<span class="text-success">✓ Sharing your location</span>`;
    }
  }

  function shareLiveLocation() {
    const lat = document.getElementById("liveLat").value;
    const lng = document.getElementById("liveLng").value;
    if (!lat || !lng) return alert('Enter both latitude and longitude');
    if (currentOrder) {
      DataManager.setLiveLocation(currentOrder.id, 'customer', lat, lng);
      document.getElementById('liveLocResult').innerHTML = `<span class="text-success">✓ Sharing: ${lat}, ${lng}</span>`;
    }
  }

  showPage('login');
</script>
</body>
</html>
