<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ZipBite - Delivery Partner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background: #f5f5f5; }
    .navbar { background: #fff !important; border-bottom: 1px solid #e5e5e5; }
    .card { border-color: #e5e5e5; border-radius: 10px; transition: all 0.2s; }
    .card:hover { box-shadow: 0 8px 18px -7px rgba(255, 107, 53, 0.3); }
    .stat-card { background: linear-gradient(135deg, #fff 0%, #fafafa 100%); }
    .btn-primary { background: #FF6B35; border-color: #FF6B35; }
    .btn-primary:hover { background: #e55a28; border-color: #e55a28; }
    .btn-success { background: #FF6B35; border-color: #FF6B35; }
    .btn-success:hover { background: #e55a28; border-color: #e55a28; }
    .tracking-badge { background: #e3f2fd; color: #1976d2; padding: 0.5rem 1rem; border-radius: 20px; }
    .location-card { background: #f0f7ff; border: 1px solid #90caf9; border-radius: 10px; padding: 1rem; }
    .container { max-width: 1000px; }
    .loading { display: none; text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <!-- HEADER -->
  <nav class="navbar navbar-light">
    <div class="container">
      <span class="navbar-brand fw-bold" style="color:#FF6B35; font-size: 1.3rem;">🚴 ZipBite Delivery</span>
      <span class="small text-secondary" id="dlvDemo">Demo: 9876543210 / 1234</span>
    </div>
  </nav>

  <div class="container py-4">
    <!-- LOGIN PAGE -->
    <div id="loginBox">
      <div class="row">
        <div class="col-md-4 offset-md-4">
          <div class="card shadow">
            <div class="card-body p-4">
              <h3 class="mb-4 text-center" style="color: #FF6B35;">Delivery Login</h3>
              <form onsubmit="doLogin(event)">
                <input class="form-control mb-2" placeholder="Phone" id="dlvPhone" required>
                <input class="form-control mb-3" placeholder="PIN" id="dlvPin" type="password" required>
                <button class="btn w-100" style="background:#FF6B35;color:#fff;" type="submit">Login</button>
              </form>
              <div class="text-center mt-3 small text-secondary">Demo: 9876543210 / 1234</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="mainBox" class="d-none">
      <!-- STATS -->
      <div class="row g-3 mb-4">
        <div class="col-md-3">
          <div class="card stat-card p-3">
            <h6 class="text-secondary mb-2 small">Today's Deliveries</h6>
            <h3 id="todayDeliveries">0</h3>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card stat-card p-3">
            <h6 class="text-secondary mb-2 small">Earnings</h6>
            <h3 style="color:#FF6B35;" id="todayEarnings">₹0</h3>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card stat-card p-3">
            <h6 class="text-secondary mb-2 small">Partner</h6>
            <h5 id="dlvName">--</h5>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card stat-card p-3">
            <h6 class="text-secondary mb-2 small">Status</h6>
            <div>
              <label class="form-check-label">
                <input type="checkbox" id="onlineToggle" onchange="toggleOnline()" class="form-check-input">
                <span id="onlineLbl">Offline</span>
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- AVAILABLE DELIVERIES -->
      <div id="deliveriesSection" class="card mb-4">
        <div class="card-body">
          <h5 class="mb-3">Available Deliveries</h5>
          <div id="deliveriesLoading" class="loading"><div class="spinner-border"></div></div>
          <div id="deliveriesBox"></div>
        </div>
      </div>

      <!-- ACTIVE DELIVERY -->
      <div id="activeDeliveryBox" class="d-none card">
        <div class="card-body">
          <h5 class="mb-3">Active Delivery</h5>
          <div id="dlvDetails" class="mb-4 p-3 bg-light rounded"></div>
          
          <div class="row g-3">
            <div class="col-md-6">
              <h6 class="mb-3">Share Your Location</h6>
              <label class="form-label small fw-600">Customer can track you</label>
              <div class="input-group input-group-sm">
                <input class="form-control" id="dlvLat" placeholder="Latitude">
                <input class="form-control" id="dlvLng" placeholder="Longitude">
                <button class="btn btn-outline-primary btn-sm" onclick="shareAgentLoc()">Share</button>
              </div>
              <div id="dlvLocResult" class="mb-2 small mt-2 text-success"></div>
            </div>
            
            <div class="col-md-6">
              <h6 class="mb-3">Customer Location</h6>
              <div class="location-card">
                <div class="small mb-2"><strong>Delivery To:</strong></div>
                <div class="small" id="customerLocDisplay">Waiting for customer to share...</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="api-client.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let partner = {name:"Raj Kumar", online:true, todayDeliveries:0, todayEarnings:0, rating:4.8};
    let deliveries = [];
    let activeDelivery = null;
    let locationUpdateInterval = null;

    function doLogin(e) {
      e.preventDefault();
      const phone = document.getElementById('dlvPhone').value;
      const pin = document.getElementById('dlvPin').value;
      if (!phone || !pin) return alert('Fill both fields');
      document.getElementById('dlvName').innerText = partner.name;
      document.getElementById('loginBox').classList.add('d-none');
      document.getElementById('mainBox').classList.remove('d-none');
      loadAvailableDeliveries();
      render();
    }

    function logout() {
      if (locationUpdateInterval) clearInterval(locationUpdateInterval);
      location.reload();
    }

    function toggleOnline() {
      partner.online = document.getElementById('onlineToggle').checked;
      document.getElementById('onlineLbl').innerText = partner.online ? "Online" : "Offline";
    }

    function loadAvailableDeliveries() {
      const allOrders = DataManager.getOrders();
      deliveries = allOrders.filter(o => o.status === 'Order Placed' || o.status === 'Ready for Delivery');
      deliveries = deliveries.map(o => ({
        ...o,
        restaurant: DataManager.getRestaurant(o.restaurantId)?.name || 'Unknown',
        customer: o.customerName
      }));
    }

    function render() {
      document.getElementById('todayDeliveries').innerText = partner.todayDeliveries;
      document.getElementById('todayEarnings').innerText = "₹" + partner.todayEarnings;
      
      // DELIVERIES LIST
      const dBox = document.getElementById('deliveriesBox');
      if (deliveries.length === 0) dBox.innerHTML = `<div class="alert alert-info text-center py-4">No deliveries available yet.</div>`;
      else dBox.innerHTML = deliveries.map((d) => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <div>
                <strong>${d.id}</strong>
                <div class="small text-secondary mt-1">
                  <div>🏪 ${d.restaurant}</div>
                  <div>👤 ${d.customer}</div>
                  <div>📍 ${d.customerAddress}</div>
                </div>
              </div>
              <span class="badge bg-success">₹${d.total}</span>
            </div>
            <button class="btn btn-sm" style="background:#FF6B35;color:#fff;" onclick="acceptDelivery('${d.id}')">Accept Delivery</button>
          </div>
        </div>
      `).join('');
    }

    function acceptDelivery(orderId) {
      const order = DataManager.getOrders().find(o => o.id === orderId);
      if (!order) return alert('Order not found');
      
      activeDelivery = order;
      partner.todayDeliveries++;
      
      DataManager.updateOrder(orderId, { status: 'Out for Delivery' });
      
      document.getElementById('activeDeliveryBox').classList.remove('d-none');
      document.getElementById('deliveriesSection').classList.add('d-none');
      
      document.getElementById('dlvDetails').innerHTML = `
        <div class="mb-2"><strong>Order ID:</strong> ${activeDelivery.id}</div>
        <div class="mb-2"><strong>Restaurant:</strong> ${DataManager.getRestaurant(activeDelivery.restaurantId)?.name}</div>
        <div class="mb-2"><strong>Customer:</strong> ${activeDelivery.customerName}</div>
        <div><strong>Delivery To:</strong> ${activeDelivery.customerAddress}</div>
      `;
      
      startCustomerLocationTracking();
    }

    function shareAgentLoc() {
      const lat = document.getElementById('dlvLat').value;
      const lng = document.getElementById('dlvLng').value;
      if (!lat || !lng) return alert('Enter both latitude and longitude');
      
      if (activeDelivery) {
        DataManager.setLiveLocation(activeDelivery.id, 'driver', lat, lng);
        document.getElementById('dlvLocResult').innerText = `✓ Sharing: Lat ${lat}, Lng ${lng}`;
      }
    }

    function startCustomerLocationTracking() {
      if (locationUpdateInterval) clearInterval(locationUpdateInterval);
      
      locationUpdateInterval = setInterval(() => {
        if (!activeDelivery) return;
        
        const custLoc = DataManager.getLiveLocation(activeDelivery.id, 'customer');
        if (custLoc) {
          document.getElementById('customerLocDisplay').innerHTML = `
            <div class="mb-2">Latitude: <strong>${custLoc.lat.toFixed(4)}</strong></div>
            <div>Longitude: <strong>${custLoc.lng.toFixed(4)}</strong></div>
            <div class="small text-muted mt-2">Live tracking active</div>
          `;
        } else {
          document.getElementById('customerLocDisplay').innerHTML = `<div class="small text-secondary">Waiting for customer to share location...</div>`;
        }
      }, 3000);
    }

    loadAvailableDeliveries();
  </script>
</body>
</html>
